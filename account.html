<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Account — NovaFlex Peptides</title>
<meta name="description" content="Your NovaFlex Peptides account — rewards points, order history, and account settings.">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#f7f4ee">
<link rel="icon" href="assets/logo.webp?v=4">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"></noscript>
<style>
  :root{
    --bg:#f7f4ee; --bg-alt:#ffffff; --line:rgba(30,24,10,0.12); --line-strong:rgba(30,24,10,0.22);
    --silver:#4b4842; --silver-bright:#171410; --silver-dim:#8c887f;
    --gold:#b08d2e; --gold-bright:#8a6a24; --gold-deep:#6f5518; --text:#221f18; --text-muted:#6b675f; --maxw:920px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-family:'Space Grotesk',sans-serif;margin:0;letter-spacing:-0.01em;}
  a{color:inherit;text-decoration:none;}
  img{max-width:100%;display:block;height:auto;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px;}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);}
  :focus-visible{outline:2px solid var(--gold-bright);outline-offset:2px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-size:14px;font-weight:600;padding:12px 22px;border-radius:6px;cursor:pointer;border:1px solid transparent;transition:all .2s ease;font-family:'Inter',sans-serif;}
  .btn-gold{background:linear-gradient(135deg,var(--gold-bright),var(--gold) 60%,var(--gold-deep));color:#141008;}
  .btn-gold:hover{filter:brightness(1.08);}
  .btn-gold:disabled{opacity:.55;cursor:not-allowed;}
  .btn-ghost{background:transparent;border-color:var(--line-strong);color:var(--silver);}
  .btn-ghost:hover{border-color:var(--gold);color:var(--gold-bright);}

  .nav{border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(255,255,255,0.92);backdrop-filter:blur(8px);z-index:20;}
  .nav-inner{max-width:var(--maxw);margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand img{width:auto;height:32px;}
  .brand-text{font-family:'Space Grotesk';font-weight:700;font-size:18px;color:var(--silver-bright);}
  .brand-text .flex{color:var(--gold-bright);}
  .nav-right a{font-size:13px;color:var(--silver-dim);}
  .nav-right a:hover{color:var(--gold-bright);}

  main{padding:40px 0 70px;min-height:62vh;}

  /* login */
  .login{max-width:440px;margin:16px auto 0;background:var(--bg-alt);border:1px solid var(--line);border-radius:12px;padding:32px 30px;}
  .login .eyebrow{text-align:center;display:block;}
  .login h1{font-size:24px;color:var(--silver-bright);text-align:center;margin-top:10px;}
  .login p{margin-top:12px;font-size:13.5px;color:var(--text-muted);line-height:1.6;text-align:center;}
  .login .tabs{display:flex;gap:8px;margin-top:22px;}
  .login .tab{flex:1;padding:11px;font-size:13px;font-weight:600;border-radius:7px;cursor:pointer;border:1px solid var(--line-strong);background:transparent;color:var(--silver-dim);font-family:'Inter';}
  .login .tab.active{background:var(--gold);color:#141008;border-color:var(--gold);}
  .login form{display:flex;flex-direction:column;gap:12px;margin-top:18px;}
  .login input{width:100%;background:var(--bg);border:1px solid var(--line-strong);border-radius:7px;padding:13px 14px;color:var(--silver);font-size:14px;}
  .login input:focus{outline:none;border-color:var(--gold);}
  .login .check{display:flex;gap:10px;align-items:flex-start;font-size:12px;color:var(--silver);line-height:1.5;}
  .login .check input{width:15px;height:15px;margin-top:2px;accent-color:var(--gold);flex-shrink:0;}
  .login .btn-gold{width:100%;}
  .msg{margin-top:14px;font-size:12.5px;line-height:1.5;display:none;text-align:center;}
  .msg.err{display:block;color:#e08484;}
  .msg.ok{display:block;color:var(--gold-bright);}

  /* dashboard */
  .dash-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .dash-head h1{font-size:clamp(22px,3vw,30px);color:var(--silver-bright);}
  .dash-head .eyebrow{display:block;margin-bottom:8px;}
  .logout{font-size:13px;color:var(--silver-dim);border:1px solid var(--line-strong);border-radius:6px;padding:8px 14px;cursor:pointer;background:transparent;font-family:'Inter';}
  .logout:hover{border-color:#e08484;color:#e08484;}

  .points-card{margin-top:26px;position:relative;overflow:hidden;border:1px solid var(--gold-deep);border-radius:16px;
    background:linear-gradient(120deg,#f9f2e4,#ffffff 62%);padding:26px 28px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;box-shadow:0 0 40px rgba(201,164,76,0.12);}
  .points-card::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 90% -10%,rgba(240,215,140,0.18),transparent 55%);pointer-events:none;}
  .points-info{position:relative;z-index:1;}
  .points-info .k{font-family:'IBM Plex Mono';font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold-bright);}
  .points-info .v{font-family:'Space Grotesk';font-weight:700;font-size:44px;color:var(--silver-bright);line-height:1;margin-top:8px;}
  .points-info .v span{font-size:18px;color:var(--gold-bright);margin-left:6px;}
  .points-info .note{margin-top:8px;font-size:12.5px;color:var(--text-muted);}

  .stat-grid{margin-top:16px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .scard{background:var(--bg-alt);border:1px solid var(--line);border-radius:10px;padding:16px 18px;}
  .scard .k{font-size:10.5px;text-transform:uppercase;letter-spacing:0.09em;color:var(--text-muted);font-family:'IBM Plex Mono';}
  .scard .v{margin-top:8px;font-size:22px;font-weight:700;font-family:'IBM Plex Mono';color:var(--silver-bright);}
  @media(max-width:640px){.stat-grid{grid-template-columns:1fr;}}

  h2.sec{margin-top:40px;font-size:16px;color:var(--silver-bright);}
  .otable{margin-top:16px;width:100%;border-collapse:collapse;}
  .otable th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);font-family:'IBM Plex Mono';padding:0 12px 10px;border-bottom:1px solid var(--line);}
  .otable th.r,.otable td.r{text-align:right;}
  .otable td{padding:13px 12px;border-bottom:1px solid var(--line);font-size:13.5px;color:var(--silver);vertical-align:top;}
  .otable .items{color:var(--text-muted);font-size:12.5px;}
  .pill{font-family:'IBM Plex Mono';font-size:10px;text-transform:uppercase;letter-spacing:0.05em;padding:3px 8px;border-radius:4px;}
  .pill.paid{background:rgba(46,160,80,0.15);color:#7fcf9a;}
  .pill.pending{background:rgba(201,164,76,0.15);color:var(--gold-bright);}
  .pill.cancelled{background:rgba(255,255,255,0.06);color:var(--silver-dim);}
  .empty{margin-top:16px;background:var(--bg-alt);border:1px solid var(--line);border-radius:10px;padding:28px;text-align:center;color:var(--text-muted);font-size:14px;}
  .empty a{color:var(--gold-bright);text-decoration:underline;}

  .acct-grid{margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .panel{background:var(--bg-alt);border:1px solid var(--line);border-radius:12px;padding:22px 22px;}
  .panel h3{font-size:14px;color:var(--silver-bright);}
  .krow{display:flex;justify-content:space-between;gap:12px;margin-top:14px;font-size:13.5px;}
  .krow .k{color:var(--text-muted);}
  .krow .v{color:var(--silver);}
  .panel form{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
  .panel input{width:100%;background:var(--bg);border:1px solid var(--line-strong);border-radius:7px;padding:11px 13px;color:var(--silver);font-size:13.5px;}
  .panel input:focus{outline:none;border-color:var(--gold);}
  .panel .btn-ghost{margin-top:2px;}
  .stack-picks{margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .stack-pick{display:flex;align-items:flex-start;gap:9px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:11px 12px;font-size:13px;color:var(--silver);cursor:pointer;line-height:1.35;}
  .stack-pick input{margin-top:2px;accent-color:var(--gold);width:15px;height:15px;flex-shrink:0;}
  .stack-pick small{display:block;color:var(--silver-dim);font-family:'IBM Plex Mono';font-size:11px;margin-top:2px;}
  .stack-pick input:checked ~ span{color:var(--gold-bright);}
  .stack-est{margin-top:14px;}
  .stack-addr{margin-top:12px;display:flex;flex-direction:column;gap:8px;}
  .stack-addr input,.stack-addr select{width:100%;background:var(--bg);border:1px solid var(--line-strong);border-radius:7px;padding:11px 13px;color:var(--silver);font-size:13.5px;font-family:'Inter';}
  .stack-addr input:focus,.stack-addr select:focus{outline:none;border-color:var(--gold);}
  .panel h3{font-size:14px;color:var(--silver-bright);}
  @media(max-width:560px){.stack-picks{grid-template-columns:1fr;}}
  @media(max-width:640px){.acct-grid{grid-template-columns:1fr;}}

  .partner-cta{margin-top:34px;border:1px dashed var(--line-strong);border-radius:12px;padding:20px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .partner-cta p{margin:0;font-size:13.5px;color:var(--text-muted);line-height:1.6;max-width:520px;}
  .partner-cta b{color:var(--silver-bright);}

  footer{border-top:1px solid var(--line);padding:26px 0;margin-top:40px;}
  .foot-inner{max-width:var(--maxw);margin:0 auto;padding:0 24px;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--text-muted);}
  .foot-inner a{color:var(--silver-dim);}
  .foot-inner a:hover{color:var(--gold-bright);}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gold);color:#141008;font-weight:600;font-size:13px;padding:10px 18px;border-radius:6px;opacity:0;pointer-events:none;transition:all .25s ease;z-index:60;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

<header class="nav">
  <div class="nav-inner">
    <a href="index.html" class="brand">
      <img src="assets/logo.webp?v=4" alt="NovaFlex Peptides">

    <div class="nav-right"><a href="index.html">← Back to shop</a></div>
  </div>
</header>

<main>
  <div class="wrap" id="root">
    <div style="text-align:center;color:var(--text-muted);padding:40px 0;font-family:'IBM Plex Mono';font-size:13px;">Loading…</div>
  </div>
</main>

<footer>
  <div class="foot-inner">
    <span>© 2026 NovaFlex Peptides · My Account</span>
    <a href="mailto:support@novaflexusa.com">support@novaflexusa.com</a>
  </div>
</footer>
<div class="toast" id="toast"></div>

<script>
const API = 'https://api.novaflexusa.com';
const TKEY = 'nf_shop_token';
const money = (n) => '$' + Number(n).toFixed(2);
const esc = (s) => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const root = document.getElementById('root');
let toastTimer;
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1600); }
function token(){ try{ return localStorage.getItem(TKEY); }catch(e){ return null; } }
function saveToken(t){ try{ localStorage.setItem(TKEY,t); }catch(e){} }
function clearToken(){ try{ localStorage.removeItem(TKEY); }catch(e){} }

// ---------- LOGIN / REGISTER ----------
let mode = 'login';
function showLogin(prefill){
  root.innerHTML =
    '<div class="login">'+
      '<span class="eyebrow">My Account</span>'+
      '<h1>Sign in to your account</h1>'+
      '<p>Track your orders, view your rewards points, and manage your account.</p>'+
      '<div class="tabs">'+
        '<button type="button" class="tab active" id="tabLogin">Sign in</button>'+
        '<button type="button" class="tab" id="tabReg">Create account</button>'+
      '</div>'+
      '<form id="authForm">'+
        '<input type="email" id="aEmail" placeholder="you@email.com" autocomplete="email" required>'+
        '<input type="password" id="aPass" placeholder="Password (min 8 characters)" autocomplete="current-password" required>'+
        '<label class="check" id="ruoRow" style="display:none;"><input type="checkbox" id="aRuo"> I am at least 21 and accept that all products are for in-vitro research use only — not for human or veterinary use.</label>'+
        '<button type="submit" class="btn btn-gold" id="aSubmit">Sign in →</button>'+
      '</form>'+
      '<div class="msg" id="aMsg"></div>'+
    '</div>';
  const msg=document.getElementById('aMsg');
  if(prefill){ msg.className='msg err'; msg.textContent=prefill; }
  document.getElementById('tabLogin').addEventListener('click',()=>setMode('login'));
  document.getElementById('tabReg').addEventListener('click',()=>setMode('register'));
  document.getElementById('authForm').addEventListener('submit', doAuth);
  setMode('login');
}
function setMode(m){
  mode=m;
  document.getElementById('tabLogin').classList.toggle('active',m==='login');
  document.getElementById('tabReg').classList.toggle('active',m==='register');
  document.getElementById('ruoRow').style.display = m==='register'?'flex':'none';
  document.getElementById('aSubmit').textContent = m==='register'?'Create account →':'Sign in →';
  document.getElementById('aPass').setAttribute('autocomplete', m==='register'?'new-password':'current-password');
  const msg=document.getElementById('aMsg'); if(msg) msg.className='msg';
}
async function doAuth(e){
  e.preventDefault();
  const email=document.getElementById('aEmail').value.trim();
  const password=document.getElementById('aPass').value;
  const msg=document.getElementById('aMsg'); msg.className='msg';
  const btn=document.getElementById('aSubmit'); const orig=btn.textContent; btn.disabled=true; btn.textContent='Please wait…';
  try{
    let path='/api/shop-account/login'; const body={email,password};
    if(mode==='register'){
      if(!document.getElementById('aRuo').checked){ msg.className='msg err'; msg.textContent='Please accept the research-use terms.'; btn.disabled=false; btn.textContent=orig; return; }
      body.ruoAccepted=true; path='/api/shop-account/register';
    }
    const res=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await res.json().catch(()=>({}));
    if(res.ok && d.token){ saveToken(d.token); loadDashboard(); return; }
    msg.className='msg err'; msg.textContent=d.error||'Something went wrong.'; btn.disabled=false; btn.textContent=orig;
  }catch(err){ msg.className='msg err'; msg.textContent='Could not reach the server. Please try again.'; btn.disabled=false; btn.textContent=orig; }
}

// ---------- DASHBOARD ----------
async function loadDashboard(){
  const t=token();
  if(!t){ showLogin(); return; }
  root.innerHTML='<div style="text-align:center;color:var(--text-muted);padding:40px 0;font-family:\'IBM Plex Mono\';font-size:13px;">Loading your account…</div>';
  try{
    const res=await fetch(API+'/api/shop-account/dashboard',{headers:{Authorization:'Bearer '+t}});
    if(res.status===401){ clearToken(); showLogin('Your session expired — please sign in again.'); return; }
    if(!res.ok){ const d=await res.json().catch(()=>({})); root.innerHTML='<div class="empty">'+esc(d.error||'Could not load your account.')+'</div>'; return; }
    renderDashboard(await res.json());
  }catch(err){ root.innerHTML='<div class="empty">Couldn\'t reach the server. Please refresh in a moment.</div>'; }
}

function statusPill(s){ const c = s==='paid'?'paid':s==='pending'?'pending':'cancelled'; return '<span class="pill '+c+'">'+esc(s)+'</span>'; }

function renderDashboard(d){
  const since = d.memberSince ? new Date(d.memberSince).toLocaleDateString(undefined,{year:'numeric',month:'short'}) : '—';
  const st = d.stats||{};
  const rows = (d.orders||[]).map(o=>{
    const items = (o.items||[]).map(i=>esc(i.name)+(i.qty>1?' ×'+i.qty:'')).join(', ');
    return '<tr>'+
      '<td>'+new Date(o.date).toLocaleDateString()+'<div class="items">'+items+'</div></td>'+
      '<td class="r">'+money(o.total)+'</td>'+
      '<td class="r">'+statusPill(o.status)+(o.status==='pending'?'<a href="pay.html?order='+o.id+'" style="color:var(--gold-bright);font-size:10.5px;text-decoration:underline;display:block;margin-top:4px;">Complete payment →</a>':'')+'</td>'+
    '</tr>';
  }).join('');
  const ordersHTML = (d.orders&&d.orders.length)
    ? '<table class="otable"><thead><tr><th>Order</th><th class="r">Total</th><th class="r">Status</th></tr></thead><tbody>'+rows+'</tbody></table>'
    : '<div class="empty">No orders yet — <a href="index.html#catalog">browse the catalog →</a></div>';

  root.innerHTML =
    '<div class="dash-head">'+
      '<div><span class="eyebrow">My Account</span><h1>Welcome back</h1></div>'+
      '<button class="logout" id="logoutBtn">Log out</button>'+
    '</div>'+
    '<div class="points-card">'+
      '<div class="points-info">'+
        '<div class="k">Rewards balance</div>'+
        '<div class="v">'+(d.points||0)+'<span>points</span></div>'+
        '<div class="note">Earn 1 point for every $1 spent. Points post once an order is paid.</div>'+
      '</div>'+
      '<a class="btn btn-ghost" href="index.html#catalog">Shop &amp; earn →</a>'+
    '</div>'+
    '<div class="stat-grid">'+
      '<div class="scard"><div class="k">Orders</div><div class="v">'+(st.totalOrders||0)+'</div></div>'+
      '<div class="scard"><div class="k">Total spent</div><div class="v">'+money(st.totalSpent||0)+'</div></div>'+
      '<div class="scard"><div class="k">Member since</div><div class="v" style="font-size:15px;padding-top:5px;">'+since+'</div></div>'+
    '</div>'+
    '<div id="stackSection"></div>'+
    '<h2 class="sec">Your orders</h2>'+
    ordersHTML+
    '<h2 class="sec">Account settings</h2>'+
    '<div class="acct-grid">'+
      '<div class="panel">'+
        '<h3>Profile</h3>'+
        '<div class="krow"><span class="k">Email</span><span class="v">'+esc(d.email)+'</span></div>'+
        '<div class="krow"><span class="k">Member since</span><span class="v">'+since+'</span></div>'+
        '<div class="krow"><span class="k">Rewards points</span><span class="v">'+(d.points||0)+'</span></div>'+
      '</div>'+
      '<div class="panel">'+
        '<h3>Change password</h3>'+
        '<form id="pwForm">'+
          '<input type="password" id="pwCur" placeholder="Current password" autocomplete="current-password" required>'+
          '<input type="password" id="pwNew" placeholder="New password (min 8)" autocomplete="new-password" required>'+
          '<button type="submit" class="btn btn-ghost" id="pwBtn">Update password</button>'+
        '</form>'+
        '<div class="msg" id="pwMsg"></div>'+
      '</div>'+
    '</div>'+
    '<div class="partner-cta">'+
      '<p><b>Want to earn as a partner?</b> Refer researchers and earn commission on every order. Membership is reviewed — apply to the team and we\'ll be in touch.</p>'+
      '<a class="btn btn-ghost" href="team.html">Apply to the team →</a>'+
    '</div>';

  document.getElementById('logoutBtn').addEventListener('click',()=>{ clearToken(); showLogin(); });
  document.getElementById('pwForm').addEventListener('submit', changePassword);
  renderStack();
}

// ---------------- Research Stack ----------------
const STACK_PRODUCTS = [
  {name:"Retatrutide",display:"NV-3RT",spec:"10mg vial",price:80},
  {name:"Tirzepatide",display:"NV-2TZ",spec:"10mg vial",price:65},
  {name:"Cagrilintide",display:"Cagrilintide",spec:"10mg vial",price:110},
  {name:"Tesamorelin",display:"Tesamorelin",spec:"10mg vial",price:115},
  {name:"MOTS-C",display:"MOTS-C",spec:"10mg vial",price:50},
  {name:"IGF-1 LR3",display:"IGF-1 LR3",spec:"1mg vial",price:75},
  {name:"BP+",display:"BP+",spec:"5mg vial",price:40},
  {name:"TB-500",display:"TB-500",spec:"5mg vial",price:55},
  {name:"KPV",display:"KPV",spec:"10mg vial",price:45},
  {name:"GHK-Cu",display:"GHK-Cu",spec:"100mg vial",price:58},
  {name:"Melanotan II",display:"Melanotan II",spec:"10mg vial",price:45},
  {name:"Semax",display:"Semax",spec:"5mg vial",price:40},
  {name:"Selank",display:"Selank",spec:"10mg vial",price:55},
  {name:"Kisspeptin-10",display:"Kisspeptin-10",spec:"5mg vial",price:55},
  {name:"NAD+",display:"NAD+",spec:"500mg vial",price:60},
  {name:"SS-31",display:"SS-31",spec:"10mg vial",price:85},
  {name:"PT-141",display:"PT-141",spec:"5mg vial",price:50},
  {name:"Glow Blend",display:"GHK-Cu · BP+ · TB-500",spec:"70mg vial",price:130},
  {name:"Klow Blend",display:"KPV · GHK-Cu · BP+ · TB-500",spec:"80mg vial",price:135},
  {name:"Wolverine Stack",display:"BP+ · TB-500",spec:"10mg vial",price:75},
  {name:"CJC-1295 + Ipamorelin",display:"CJC-1295 + Ipamorelin",spec:"5/5 blend vial",price:88},
];
const US_STATES = ['AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA','KS','KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY','DC'];
const prodKey = (p) => p.name + '||' + p.spec;
let stackSel = [];  // array of prodKey while building

async function renderStack(){
  const el = document.getElementById('stackSection'); if(!el) return;
  el.innerHTML = '<h2 class="sec">Research Stack</h2><div class="empty">Loading your stack…</div>';
  let d;
  try { const r = await fetch(API+'/api/shop-account/stack',{headers:{Authorization:'Bearer '+token()}}); d = await r.json(); if(!r.ok) throw 0; }
  catch(e){ el.innerHTML = '<h2 class="sec">Research Stack</h2><div class="empty">Could not load your stack.</div>'; return; }
  if(d.status==='active'||d.status==='paused'){ renderStackActive(d); }
  else { renderStackBuilder(); }
}

function renderStackActive(d){
  const el = document.getElementById('stackSection');
  const items = (d.items||[]).map(i=>{
    const p = STACK_PRODUCTS.find(x=>x.name===i.name&&x.spec===i.spec);
    return '<li>'+esc((p&&p.display)||i.name)+' <span style="color:var(--silver-dim)">'+esc(i.spec)+'</span></li>';
  }).join('');
  const est = d.estimate||{};
  const paused = d.status==='paused';
  el.innerHTML =
    '<h2 class="sec">Research Stack '+(paused?'<span class="pill pending" style="margin-left:6px;">Paused</span>':'<span class="pill paid" style="margin-left:6px;">Active</span>')+'</h2>'+
    '<div class="panel" style="margin-top:8px;">'+
      '<p style="margin:0 0 12px;font-size:13.5px;color:var(--text-muted);">Your custom stack renews on the <b style="color:var(--silver)">5th of each month</b> at 10% off. We\'ll email a one-click pay link when it\'s ready. '+(paused?'Billing is paused.':'')+'</p>'+
      '<ul style="margin:0 0 14px;padding-left:18px;font-size:14px;color:var(--silver);line-height:1.8;">'+items+'</ul>'+
      '<div class="krow"><span class="k">Subtotal</span><span class="v">'+money(est.subtotal||0)+'</span></div>'+
      '<div class="krow"><span class="k">Stack discount (10%)</span><span class="v" style="color:var(--gold-bright)">−'+money(est.discount||0)+'</span></div>'+
      '<div class="krow"><span class="k">Per month (before shipping/tax)</span><span class="v">'+money(est.afterDiscount||0)+'</span></div>'+
      '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;">'+
        '<button class="btn btn-ghost" id="stackEdit">Edit stack</button>'+
        (paused
          ? '<button class="btn btn-ghost" id="stackResume">Resume</button>'
          : '<button class="btn btn-ghost" id="stackPause">Pause</button>')+
        '<button class="btn btn-ghost" id="stackCancel" style="border-color:rgba(224,132,132,.4);color:#e08484;">Cancel stack</button>'+
      '</div>'+
      '<div class="msg" id="stackMsg"></div>'+
    '</div>';
  document.getElementById('stackEdit').addEventListener('click',()=>{ stackSel = (d.items||[]).map(prodKey); renderStackBuilder(d.ship); });
  const pauseBtn=document.getElementById('stackPause'); if(pauseBtn) pauseBtn.addEventListener('click',()=>setStackStatus('paused'));
  const resumeBtn=document.getElementById('stackResume'); if(resumeBtn) resumeBtn.addEventListener('click',()=>setStackStatus('active'));
  document.getElementById('stackCancel').addEventListener('click',()=>{ if(confirm('Cancel your Research Stack? This stops monthly billing and clears your stack.')) setStackStatus('cancelled'); });
}

async function setStackStatus(status){
  const msg=document.getElementById('stackMsg');
  try{
    const r=await fetch(API+'/api/shop-account/stack/status',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token()},body:JSON.stringify({status})});
    const d=await r.json(); if(!r.ok) throw new Error(d.error||'Failed.');
    toast('Stack updated'); renderStack();
  }catch(e){ if(msg){msg.className='msg err';msg.textContent=e.message;} }
}

function renderStackBuilder(existingShip){
  const el = document.getElementById('stackSection');
  const s = existingShip||{};
  const prodRows = STACK_PRODUCTS.map(p=>{
    const k = prodKey(p);
    const checked = stackSel.includes(k) ? 'checked' : '';
    return '<label class="stack-pick"><input type="checkbox" data-key="'+esc(k)+'" '+checked+'> <span>'+esc(p.display)+' <small>'+esc(p.spec)+' · '+money(p.price)+'</small></span></label>';
  }).join('');
  const stateOpts = '<option value="" disabled '+(s.state?'':'selected')+'>State</option>'+US_STATES.map(x=>'<option '+(s.state===x?'selected':'')+'>'+x+'</option>').join('');
  el.innerHTML =
    '<h2 class="sec">Build your Research Stack</h2>'+
    '<div class="panel" style="margin-top:8px;">'+
      '<p style="margin:0 0 4px;font-size:13.5px;color:var(--text-muted);">Pick <b style="color:var(--silver)">2 to 4 compounds</b>. Your stack renews on the 5th each month at <b style="color:var(--gold-bright)">10% off</b>.</p>'+
      '<div class="stack-picks" id="stackPicks">'+prodRows+'</div>'+
      '<div id="stackEst" class="stack-est"></div>'+
      '<h3 style="margin-top:22px;">Shipping address</h3>'+
      '<div class="stack-addr">'+
        '<input id="stName" placeholder="Full name" value="'+esc(s.name||'')+'">'+
        '<input id="stLine1" placeholder="Street address" value="'+esc(s.line1||'')+'">'+
        '<input id="stLine2" placeholder="Apt, suite (optional)" value="'+esc(s.line2||'')+'">'+
        '<input id="stCity" placeholder="City" value="'+esc(s.city||'')+'">'+
        '<div style="display:flex;gap:8px;"><select id="stState" style="flex:1;">'+stateOpts+'</select><input id="stPostal" placeholder="ZIP" inputmode="numeric" style="flex:1;" value="'+esc(s.postal||'')+'"></div>'+
      '</div>'+
      '<label class="check" style="margin-top:16px;"><input type="checkbox" id="stConsent"> I authorize NovaFlex to prepare and bill this stack order automatically on the 5th of each month (via a one-click pay link) until I pause or cancel it.</label>'+
      '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;"><button class="btn btn-gold" id="stackSave">Start my stack</button>'+(stackSel.length?'<button class="btn btn-ghost" id="stackBack">Back</button>':'')+'</div>'+
      '<div class="msg" id="stackMsg"></div>'+
    '</div>';
  const picks = document.getElementById('stackPicks');
  function refresh(){
    stackSel = [...picks.querySelectorAll('input:checked')].map(c=>c.dataset.key);
    picks.querySelectorAll('input').forEach(c=>{ c.disabled = !c.checked && stackSel.length>=4; });
    const sel = stackSel.map(k=>STACK_PRODUCTS.find(p=>prodKey(p)===k)).filter(Boolean);
    const sub = sel.reduce((a,p)=>a+p.price,0);
    const disc = Math.round(sub*0.10*100)/100;
    document.getElementById('stackEst').innerHTML = sel.length? '<div class="krow"><span class="k">'+sel.length+' compound'+(sel.length>1?'s':'')+' · subtotal</span><span class="v">'+money(sub)+'</span></div><div class="krow"><span class="k">Stack discount (10%)</span><span class="v" style="color:var(--gold-bright)">−'+money(disc)+'</span></div><div class="krow"><span class="k">Per month (before shipping/tax)</span><span class="v">'+money(sub-disc)+'</span></div>' : '<p style="font-size:12.5px;color:var(--silver-dim);margin-top:8px;">Select 2–4 compounds to see your monthly price.</p>';
  }
  picks.addEventListener('change', refresh); refresh();
  const stateSel=document.getElementById('stState'); if(s.state) stateSel.value=s.state;
  document.getElementById('stackSave').addEventListener('click', saveStack);
  const back=document.getElementById('stackBack'); if(back) back.addEventListener('click',renderStack);
}

async function saveStack(){
  const msg=document.getElementById('stackMsg'); msg.className='msg';
  const sel = stackSel.map(k=>{ const p=STACK_PRODUCTS.find(x=>prodKey(x)===k); return p?{name:p.name,spec:p.spec}:null; }).filter(Boolean);
  if(sel.length<2||sel.length>4){ msg.className='msg err'; msg.textContent='Choose 2 to 4 compounds.'; return; }
  const ship = { name:val('stName'), line1:val('stLine1'), line2:val('stLine2'), city:val('stCity'), state:document.getElementById('stState').value, postal:val('stPostal'), country:'US' };
  if(!ship.name||!ship.line1||!ship.city||!ship.state||!ship.postal){ msg.className='msg err'; msg.textContent='Please complete the shipping address.'; return; }
  if(!document.getElementById('stConsent').checked){ msg.className='msg err'; msg.textContent='Please authorize the monthly billing to start your stack.'; return; }
  const btn=document.getElementById('stackSave'); btn.disabled=true; const o=btn.textContent; btn.textContent='Saving…';
  try{
    const r=await fetch(API+'/api/shop-account/stack',{method:'PUT',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token()},body:JSON.stringify({items:sel,ship,consent:true})});
    const d=await r.json(); if(!r.ok) throw new Error(d.error||'Could not save.');
    toast('Research Stack saved'); renderStack();
  }catch(e){ msg.className='msg err'; msg.textContent=e.message; btn.disabled=false; btn.textContent=o; }
}
function val(id){ return (document.getElementById(id).value||'').trim(); }

async function changePassword(e){
  e.preventDefault();
  const cur=document.getElementById('pwCur').value, nw=document.getElementById('pwNew').value;
  const msg=document.getElementById('pwMsg'); msg.className='msg';
  const btn=document.getElementById('pwBtn'); const orig=btn.textContent; btn.disabled=true; btn.textContent='Saving…';
  try{
    const res=await fetch(API+'/api/shop-account/change-password',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token()},body:JSON.stringify({currentPassword:cur,newPassword:nw})});
    const d=await res.json().catch(()=>({}));
    if(res.ok && d.ok){ msg.className='msg ok'; msg.textContent='Password updated.'; document.getElementById('pwForm').reset(); toast('Password updated'); }
    else { msg.className='msg err'; msg.textContent=d.error||'Could not update password.'; }
  }catch(err){ msg.className='msg err'; msg.textContent='Could not reach the server.'; }
  btn.disabled=false; btn.textContent=orig;
}

loadDashboard();
</script>
</body>
</html>
