<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Dashboard — NovaFlex Peptides</title>
<meta name="description" content="NovaFlex Peptides team partner dashboard.">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#f7f4ee">
<link rel="icon" href="assets/logo.webp?v=4">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"></noscript>
<style>
  :root{
    --bg:#f7f4ee; --bg-alt:#ffffff; --line:rgba(30,24,10,0.12); --line-strong:rgba(30,24,10,0.22);
    --silver:#4b4842; --silver-bright:#171410; --silver-dim:#8c887f;
    --gold:#b08d2e; --gold-bright:#8a6a24; --gold-deep:#6f5518; --text:#221f18; --text-muted:#6b675f; --maxw:920px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-family:'Space Grotesk',sans-serif;margin:0;letter-spacing:-0.01em;}
  a{color:inherit;text-decoration:none;}
  img{max-width:100%;display:block;height:auto;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px;}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);}
  :focus-visible{outline:2px solid var(--gold-bright);outline-offset:2px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-size:14px;font-weight:600;padding:12px 22px;border-radius:5px;cursor:pointer;border:1px solid transparent;transition:all .2s ease;font-family:'Inter',sans-serif;}
  .btn-gold{background:linear-gradient(135deg,var(--gold-bright),var(--gold) 60%,var(--gold-deep));color:#141008;}
  .btn-gold:hover{filter:brightness(1.08);}
  .btn-gold:disabled{opacity:.55;cursor:not-allowed;}
  .btn-ghost{background:transparent;border-color:var(--line-strong);color:var(--silver);}
  .btn-ghost:hover{border-color:var(--gold);color:var(--gold-bright);}

  .nav{border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(255,255,255,0.92);backdrop-filter:blur(8px);z-index:20;}
  .nav-inner{max-width:var(--maxw);margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand img{width:auto;height:32px;}
  .brand-text{font-family:'Space Grotesk';font-weight:700;font-size:18px;color:var(--silver-bright);}
  .brand-text .flex{color:var(--gold-bright);}
  .nav-right a{font-size:13px;color:var(--silver-dim);}
  .nav-right a:hover{color:var(--gold-bright);}

  main{padding:44px 0 70px;min-height:60vh;}

  /* login */
  .login{max-width:440px;margin:20px auto 0;background:var(--bg-alt);border:1px solid var(--line);border-radius:12px;padding:32px 30px;text-align:center;}
  .login h1{font-size:24px;color:var(--silver-bright);}
  .login p{margin-top:12px;font-size:14px;color:var(--text-muted);line-height:1.6;}
  .login input{width:100%;margin-top:22px;background:var(--bg);border:1px solid var(--line-strong);border-radius:6px;padding:13px 14px;color:var(--silver);font-size:14px;}
  .login input:focus{outline:none;border-color:var(--gold);}
  .login .btn-gold{width:100%;margin-top:12px;}
  .login-msg{margin-top:16px;font-size:13px;line-height:1.5;display:none;}
  .login-msg.ok{display:block;color:var(--gold-bright);}
  .login-msg.err{display:block;color:#e08484;}
  .login .linkrow{margin-top:18px;font-size:13px;color:var(--text-muted);}
  .login .linkrow a{color:var(--gold);cursor:pointer;}
  .login .linkrow a:hover{color:var(--gold-bright);}
  .login .hint{margin-top:8px;font-size:12px;color:var(--silver-dim);line-height:1.5;}
  .login textarea{width:100%;margin-top:12px;background:var(--bg);border:1px solid var(--line-strong);border-radius:6px;padding:13px 14px;color:var(--silver);font-size:14px;font-family:'Inter',sans-serif;resize:vertical;}
  .login textarea:focus{outline:none;border-color:var(--gold);}
  #applyForm input,#applyForm textarea{margin-top:12px;}

  /* dashboard */
  .dash-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .dash-head h1{font-size:clamp(22px,3vw,30px);color:var(--silver-bright);}
  .dash-head .eyebrow{display:block;margin-bottom:8px;}
  .code-box{display:flex;align-items:center;gap:12px;margin-top:20px;flex-wrap:wrap;}
  .code-pill{display:inline-flex;align-items:center;gap:10px;background:var(--bg-alt);border:1px solid var(--line-strong);border-radius:7px;padding:11px 16px;font-family:'IBM Plex Mono';font-size:18px;font-weight:600;color:var(--gold-bright);letter-spacing:1px;cursor:pointer;}
  .code-pill:hover{border-color:var(--gold);}
  .code-note{font-size:13px;color:var(--text-muted);}
  .code-note b{color:var(--silver-bright);}

  .stat-grid{margin-top:30px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .scard{background:var(--bg-alt);border:1px solid var(--line);border-radius:10px;padding:16px 18px;}
  .scard.hl{border-color:rgba(201,164,76,0.4);}
  .scard .k{font-size:10.5px;text-transform:uppercase;letter-spacing:0.09em;color:var(--text-muted);font-family:'IBM Plex Mono';}
  .scard .v{margin-top:8px;font-size:24px;font-weight:700;font-family:'IBM Plex Mono';color:var(--silver-bright);}
  .scard.hl .v{color:var(--gold-bright);}
  .scard.green .v{color:#7fcf9a;}
  @media(max-width:720px){.stat-grid{grid-template-columns:1fr 1fr;}}

  h2.sec{margin-top:40px;font-size:16px;color:var(--silver-bright);}
  .otable{margin-top:16px;width:100%;border-collapse:collapse;}
  .otable th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);font-family:'IBM Plex Mono';padding:0 12px 10px;border-bottom:1px solid var(--line);}
  .otable th.r,.otable td.r{text-align:right;}
  .otable td{padding:13px 12px;border-bottom:1px solid var(--line);font-size:13.5px;color:var(--silver);font-variant-numeric:tabular-nums;}
  .otable .comm{color:#7fcf9a;font-family:'IBM Plex Mono';}
  .pill{font-family:'IBM Plex Mono';font-size:10.5px;text-transform:uppercase;letter-spacing:0.05em;padding:3px 8px;border-radius:4px;}
  .pill.paid{background:rgba(46,160,80,0.15);color:#7fcf9a;}
  .pill.pending{background:rgba(201,164,76,0.15);color:var(--gold-bright);}
  .pill.cancelled{background:rgba(255,255,255,0.06);color:var(--silver-dim);}
  .empty{margin-top:16px;background:var(--bg-alt);border:1px solid var(--line);border-radius:10px;padding:30px;text-align:center;color:var(--text-muted);font-size:14px;}
  .dash-foot{margin-top:34px;padding-top:18px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
  .dash-foot .note{font-size:12px;color:var(--text-muted);}
  .logout{font-size:13px;color:var(--silver-dim);border:1px solid var(--line-strong);border-radius:5px;padding:8px 14px;cursor:pointer;background:transparent;font-family:'Inter';}
  .logout:hover{border-color:#e08484;color:#e08484;}

  footer{border-top:1px solid var(--line);padding:26px 0;margin-top:40px;}
  .foot-inner{max-width:var(--maxw);margin:0 auto;padding:0 24px;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--text-muted);}
  .foot-inner a{color:var(--silver-dim);}
  .foot-inner a:hover{color:var(--gold-bright);}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gold);color:#141008;font-weight:600;font-size:13px;padding:10px 18px;border-radius:6px;opacity:0;pointer-events:none;transition:all .25s ease;z-index:60;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<header class="nav">
  <div class="nav-inner">
    <a href="index.html" class="brand">
      <img src="assets/logo.webp?v=4" alt="NovaFlex Peptides">
      <span class="brand-text">NOVA<span class="flex">FLEX</span></span>
    </a>
    <div class="nav-right"><a href="index.html#team">← Back to site</a></div>
  </div>
</header>

<main>
  <div class="wrap" id="root">
    <div style="text-align:center;color:var(--text-muted);padding:40px 0;font-family:'IBM Plex Mono';font-size:13px;" id="loading">Loading…</div>
  </div>
</main>

<footer>
  <div class="foot-inner">
    <span>© 2026 NovaFlex Peptides · Team Portal</span>
    <a href="mailto:support@novaflexusa.com">support@novaflexusa.com</a>
  </div>
</footer>
<div class="toast" id="toast"></div>

<script>
const API = 'https://api.novaflexusa.com';
const TKEY = 'nf_aff_token';
const money = (n) => '$' + Number(n).toFixed(2);
const pct = (r) => Math.round(Number(r) * 100) + '%';
const esc = (s) => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const root = document.getElementById('root');

let toastTimer;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1600); }

// --- Email + password auth -------------------------------------------------
// The email link carries a SETUP token (?setup=): it only lets the team
// choose a password, then logs them in. Everyday access is email + password,
// which yields a SESSION token stored in localStorage. A forwarded link alone
// can't read anyone's data — the password is still required.

function saveSession(token){ try { localStorage.setItem(TKEY, token); } catch(e){} }

// LOGIN — email + password
function showLogin(prefillMsg, prefillClass){
  root.innerHTML =
    '<div class="login">'+
      '<span class="eyebrow">Team Portal</span>'+
      '<h1 style="margin-top:10px;">Log in</h1>'+
      '<p>Access your team dashboard.</p>'+
      '<form id="loginForm">'+
        '<input type="email" id="loginEmail" placeholder="you@email.com" autocomplete="email" required>'+
        '<input type="password" id="loginPass" placeholder="Password" autocomplete="current-password" required>'+
        '<button type="submit" class="btn btn-gold" id="loginBtn">Log in</button>'+
      '</form>'+
      '<div class="login-msg" id="loginMsg"></div>'+
      '<div class="linkrow"><a id="forgotLink">Forgot password?</a></div>'+
      '<div class="linkrow" style="margin-top:10px;">New to NovaFlex? <a id="applyLink">Join the fastest-growing team →</a></div>'+
    '</div>';
  const form = document.getElementById('loginForm');
  const msg = document.getElementById('loginMsg');
  if (prefillMsg){ msg.className='login-msg '+(prefillClass||'err'); msg.innerHTML=prefillMsg; }
  document.getElementById('forgotLink').addEventListener('click', () => showForgot());
  document.getElementById('applyLink').addEventListener('click', () => showApply());
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPass').value;
    msg.className='login-msg';
    btn.disabled = true; const orig = btn.textContent; btn.textContent = 'Logging in…';
    try {
      const res = await fetch(API + '/api/affiliate-portal/login', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email, password }),
      });
      const d = await res.json().catch(()=>({}));
      if (res.ok && d.token){ saveSession(d.token); loadDashboard(); return; }
      msg.className='login-msg err';
      msg.innerHTML = d.needsSetup
        ? 'You haven\'t set a password yet. Check your welcome email for the setup link, or use “Forgot password?” below to get one.'
        : (d.error || 'Incorrect email or password.');
      btn.disabled=false; btn.textContent=orig;
    } catch(err){
      msg.className='login-msg err'; msg.textContent='Something went wrong. Please try again.';
      btn.disabled=false; btn.textContent=orig;
    }
  });
}

// FORGOT — request a set/reset-password link by email
function showForgot(){
  root.innerHTML =
    '<div class="login">'+
      '<span class="eyebrow">Team Portal</span>'+
      '<h1 style="margin-top:10px;">Reset your password</h1>'+
      '<p>Enter the email on your team account and we\'ll send you a link to set a new password.</p>'+
      '<form id="forgotForm">'+
        '<input type="email" id="forgotEmail" placeholder="you@email.com" autocomplete="email" required>'+
        '<button type="submit" class="btn btn-gold" id="forgotBtn">Send reset link</button>'+
      '</form>'+
      '<div class="login-msg" id="forgotMsg"></div>'+
      '<div class="linkrow"><a id="backLogin">← Back to log in</a></div>'+
    '</div>';
  const form = document.getElementById('forgotForm');
  const msg = document.getElementById('forgotMsg');
  document.getElementById('backLogin').addEventListener('click', () => showLogin());
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('forgotBtn');
    const email = document.getElementById('forgotEmail').value.trim();
    msg.className='login-msg';
    btn.disabled = true; const orig = btn.textContent; btn.textContent = 'Sending…';
    try {
      await fetch(API + '/api/affiliate-portal/request-reset', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email }),
      });
      msg.className='login-msg ok';
      msg.innerHTML = 'If that email is on an active team account, a reset link is on its way. Check your inbox (and spam).';
      form.style.display='none';
    } catch(err){
      msg.className='login-msg err'; msg.textContent='Something went wrong. Please try again.';
      btn.disabled=false; btn.textContent=orig;
    }
  });
}

// APPLY — new applicants submit here (public); posts to /api/affiliate-apply.
// Approval + welcome email happen from the CRM; approved partners then log in above.
function showApply(){
  root.innerHTML =
    '<div class="login">'+
      '<span class="eyebrow">Team Program</span>'+
      '<h1 style="margin-top:10px;">Join the fastest-growing team</h1>'+
      '<p>Tell us a bit about you. We review every application personally and reply by email.</p>'+
      '<form id="applyForm" style="text-align:left;">'+
        '<input type="text" id="apName" placeholder="Your name" autocomplete="name" maxlength="120" required>'+
        '<input type="email" id="apEmail" placeholder="you@email.com" autocomplete="email" maxlength="200" required>'+
        '<input type="text" id="apPlatform" placeholder="Your platform (e.g. Instagram @handle)" maxlength="200">'+
        '<input type="text" id="apAudience" placeholder="Following size (e.g. 25,000 followers)" maxlength="120">'+
        '<textarea id="apMessage" rows="3" placeholder="Anything else? (optional)" maxlength="2000"></textarea>'+
        '<button type="submit" class="btn btn-gold" id="applyBtn" style="width:100%;margin-top:14px;">Submit application</button>'+
      '</form>'+
      '<div class="login-msg" id="applyMsg"></div>'+
      '<div class="linkrow"><a id="applyBack">← Back to log in</a></div>'+
    '</div>';
  document.getElementById('applyBack').addEventListener('click', () => showLogin());
  const form = document.getElementById('applyForm');
  const msg = document.getElementById('applyMsg');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const payload = {
      name: document.getElementById('apName').value.trim(),
      email: document.getElementById('apEmail').value.trim(),
      platform: document.getElementById('apPlatform').value.trim(),
      audience: document.getElementById('apAudience').value.trim(),
      message: document.getElementById('apMessage').value.trim(),
    };
    msg.className='login-msg';
    if (!payload.name){ msg.className='login-msg err'; msg.textContent='Please enter your name.'; return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(payload.email)){ msg.className='login-msg err'; msg.textContent='Please enter a valid email address.'; return; }
    const btn = document.getElementById('applyBtn'); btn.disabled=true; const orig=btn.textContent; btn.textContent='Submitting…';
    try {
      const res = await fetch(API + '/api/affiliate-apply', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload),
      });
      const d = await res.json().catch(()=>({}));
      if (!res.ok) throw new Error(d.error || 'Something went wrong. Please try again.');
      root.innerHTML =
        '<div class="login">'+
          '<span class="eyebrow">Team Program</span>'+
          '<h1 style="margin-top:10px;">Application received</h1>'+
          '<p>Thanks for applying! We\'ll review your details and get back to you by email soon.</p>'+
          '<div class="linkrow" style="margin-top:18px;"><a id="doneBack">← Back to log in</a></div>'+
        '</div>';
      const b=document.getElementById('doneBack'); if(b) b.addEventListener('click',()=>showLogin());
    } catch(err){
      msg.className='login-msg err'; msg.textContent=err.message; btn.disabled=false; btn.textContent=orig;
    }
  });
}

// SET PASSWORD — reached from the emailed setup/reset link (?setup=TOKEN)
function showSetPassword(setupToken){
  root.innerHTML =
    '<div class="login">'+
      '<span class="eyebrow">Team Portal</span>'+
      '<h1 style="margin-top:10px;">Set your password</h1>'+
      '<p>Choose a password to secure your dashboard.</p>'+
      '<form id="setForm">'+
        '<input type="password" id="pass1" placeholder="New password (min 8 characters)" autocomplete="new-password" required>'+
        '<input type="password" id="pass2" placeholder="Confirm password" autocomplete="new-password" required>'+
        '<button type="submit" class="btn btn-gold" id="setBtn">Save & open dashboard</button>'+
      '</form>'+
      '<div class="login-msg" id="setMsg"></div>'+
    '</div>';
  const form = document.getElementById('setForm');
  const msg = document.getElementById('setMsg');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const p1 = document.getElementById('pass1').value;
    const p2 = document.getElementById('pass2').value;
    msg.className='login-msg';
    if (p1.length < 8){ msg.className='login-msg err'; msg.textContent='Password must be at least 8 characters.'; return; }
    if (p1 !== p2){ msg.className='login-msg err'; msg.textContent='Those passwords don\'t match.'; return; }
    const btn = document.getElementById('setBtn');
    btn.disabled = true; const orig = btn.textContent; btn.textContent = 'Saving…';
    try {
      const res = await fetch(API + '/api/affiliate-portal/set-password', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ token: setupToken, password: p1 }),
      });
      const d = await res.json().catch(()=>({}));
      if (res.ok && d.token){ saveSession(d.token); loadDashboard(); return; }
      msg.className='login-msg err';
      msg.innerHTML = (d.error || 'Could not set your password.') +
        ' <a id="setToLogin" style="color:var(--gold);cursor:pointer">Go to log in</a>';
      const back = document.getElementById('setToLogin');
      if (back) back.addEventListener('click', () => showLogin());
      btn.disabled=false; btn.textContent=orig;
    } catch(err){
      msg.className='login-msg err'; msg.textContent='Something went wrong. Please try again.';
      btn.disabled=false; btn.textContent=orig;
    }
  });
}

async function loadDashboard(){
  const token = localStorage.getItem(TKEY);
  if (!token){ showLogin(); return; }
  try {
    const res = await fetch(API + '/api/affiliate-portal/me', { headers: { Authorization: 'Bearer ' + token } });
    if (res.status === 401){ localStorage.removeItem(TKEY); showLogin('Your session expired — please log in again.'); return; }
    if (!res.ok){ const d = await res.json().catch(()=>({})); showLogin(d.error || 'Could not load your dashboard.'); return; }
    renderDashboard(await res.json());
  } catch(err){
    root.innerHTML = '<div class="empty">Couldn\'t reach the server. Please refresh in a moment.</div>';
  }
}

// Boot: a setup link takes priority; otherwise show the dashboard/login.
function boot(){
  const u = new URL(location.href);
  const setupToken = u.searchParams.get('setup');
  if (setupToken){
    u.searchParams.delete('setup'); history.replaceState({}, '', u.pathname);
    showSetPassword(setupToken);
    return;
  }
  loadDashboard();
}

function statusPill(s){
  const cls = s === 'paid' ? 'paid' : s === 'pending' ? 'pending' : 'cancelled';
  return '<span class="pill '+cls+'">'+esc(s)+'</span>';
}

function renderDashboard(d){
  const st = d.stats || {};
  const rows = (d.orders || []).map(o =>
    '<tr>'+
      '<td>'+new Date(o.date).toLocaleDateString()+'</td>'+
      '<td class="r">'+money(o.total)+'</td>'+
      '<td class="r comm">+'+money(o.commission)+(o.commissionPaid?' ✓':'')+'</td>'+
      '<td class="r">'+statusPill(o.status)+'</td>'+
    '</tr>').join('');

  const ordersHTML = (d.orders && d.orders.length)
    ? '<table class="otable"><thead><tr><th>Date</th><th class="r">Order total</th><th class="r">Your commission</th><th class="r">Status</th></tr></thead><tbody>'+rows+'</tbody></table>'
    : '<div class="empty">No orders with your code yet — share <b style="color:var(--gold-bright)">'+esc(d.code)+'</b> to start earning.</div>';

  root.innerHTML =
    '<div class="dash-head">'+
      '<div>'+
        '<span class="eyebrow">Team Dashboard</span>'+
        '<h1>Welcome back, '+esc(d.name)+'</h1>'+
      '</div>'+
      '<button class="logout" id="logoutBtn">Log out</button>'+
    '</div>'+
    '<div class="code-box">'+
      '<span class="code-pill" id="codePill" title="Copy code">'+esc(d.code)+' <span style="font-size:12px;color:var(--silver-dim)">copy</span></span>'+
      '<span class="code-note"><b>'+pct(d.discountRate)+'</b> off for your followers · <b>'+pct(d.commissionRate)+'</b> commission to you</span>'+
    '</div>'+
    '<div class="stat-grid">'+
      '<div class="scard"><div class="k">Total sales</div><div class="v">'+money(st.totalSales||0)+'</div></div>'+
      '<div class="scard hl"><div class="k">Commission owed</div><div class="v">'+money(st.commissionOwed||0)+'</div></div>'+
      '<div class="scard green"><div class="k">Paid out</div><div class="v">'+money(st.commissionPaidOut||0)+'</div></div>'+
      '<div class="scard"><div class="k">Pending orders</div><div class="v">'+money(st.commissionPending||0)+'</div></div>'+
    '</div>'+
    '<h2 class="sec">Orders with your code</h2>'+
    ordersHTML+
    '<div class="dash-foot">'+
      '<span class="note">Commission is paid on completed orders. Questions? support@novaflexusa.com</span>'+
      '<a class="btn btn-ghost" href="index.html#catalog">View the catalog →</a>'+
    '</div>';

  document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.removeItem(TKEY); showLogin(); });
  document.getElementById('codePill').addEventListener('click', () => {
    navigator.clipboard && navigator.clipboard.writeText(d.code); toast('Copied '+d.code);
  });
}

boot();
</script>
</body>
</html>
