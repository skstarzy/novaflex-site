<!--
  NovaFlex — PRE-ORDER LAUNCH BANNER (saved for relaunch)
  Taken down on 2026-07-14. To RELAUNCH: paste the block below back into
  index.html immediately after the `<main id="top">` tag (where the
  breadcrumb comment now sits), then update the countdown dates in the
  <script> (start = Friday open, end = Sunday-night close).
  Backend note: the PRE15 discount code still exists in the backend
  (routes/checkout.js, date-gated) — adjust its from/to dates to match.
-->

  <!-- ================= PRE-ORDER BANNER ================= -->
  <style>
  .preorder-wrap{max-width:var(--maxw);margin:0 auto;padding:16px 24px 0;}
  .preorder{position:relative;overflow:hidden;border:1px solid var(--gold-deep);border-radius:16px;
    background:linear-gradient(120deg,#17120a,#0c0c0d 62%);display:flex;align-items:center;
    justify-content:space-between;gap:26px;flex-wrap:wrap;padding:24px 28px;
    box-shadow:0 0 44px rgba(201,164,76,0.13);}
  .preorder::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 88% -10%,rgba(240,215,140,0.20),transparent 55%);pointer-events:none;}
  .po-left{position:relative;z-index:1;}
  .po-eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold-bright);}
  .po-eyebrow::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--gold-bright);box-shadow:0 0 10px var(--gold-bright);animation:poPulse 1.8s ease-in-out infinite;}
  @keyframes poPulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  .po-title{font-family:'Space Grotesk',sans-serif;font-size:clamp(23px,3.2vw,32px);color:var(--silver-bright);margin:10px 0 7px;letter-spacing:-0.01em;}
  .po-title span{color:var(--gold-bright);}
  .po-sub{font-size:13.5px;color:var(--text-muted);line-height:1.6;max-width:430px;}
  .po-sub b{color:var(--gold-bright);font-family:'IBM Plex Mono',monospace;letter-spacing:1px;padding:1px 7px;border:1px solid var(--gold-deep);border-radius:5px;}
  .po-cta{display:inline-block;margin-top:15px;font-size:13px;font-weight:600;color:var(--gold-bright);border-bottom:1px solid var(--gold);padding-bottom:1px;}
  .po-cta:hover{filter:brightness(1.15);}
  .po-count{display:flex;gap:10px;position:relative;z-index:1;}
  .po-unit{background:rgba(0,0,0,0.4);border:1px solid var(--line-strong);border-radius:10px;padding:11px 13px;min-width:60px;text-align:center;}
  .po-unit b{display:block;font-family:'IBM Plex Mono',monospace;font-size:27px;font-weight:700;color:var(--gold-bright);font-variant-numeric:tabular-nums;line-height:1;}
  .po-unit small{display:block;margin-top:5px;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);}
  .po-live{position:relative;z-index:1;font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--gold-bright);font-size:17px;text-align:center;}
  .po-countwrap{position:relative;z-index:1;}
  .po-clabel{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold-bright);margin-bottom:9px;text-align:right;}
  @media(max-width:640px){.preorder{padding:20px 18px;}.po-countwrap{width:100%;}.po-count{justify-content:space-between;gap:7px;}.po-clabel{text-align:center;}.po-unit{min-width:0;flex:1;padding:9px 4px;}.po-unit b{font-size:21px;}}
  </style>
  <div class="preorder-wrap">
    <div class="preorder">
      <div class="po-left">
        <span class="po-eyebrow">Pre-order launch event</span>
        <h2 class="po-title">Save <span>15%</span> on your first order</h2>
        <p class="po-sub">Pre-orders open <strong style="color:var(--gold-bright)">Friday, Jul 17</strong> and run through Sunday night. 15% off with code <b>PRE15</b> · ships as soon as your batch lands.</p>
        <a href="#catalog" class="po-cta">Reserve yours — browse the catalog →</a>
      </div>
      <div class="po-countwrap">
        <div class="po-clabel" id="poLabel">Pre-orders start Friday — opens in</div>
        <div class="po-count" id="poCount" aria-label="Countdown">
          <div class="po-unit"><b id="poD">00</b><small>days</small></div>
          <div class="po-unit"><b id="poH">00</b><small>hrs</small></div>
          <div class="po-unit"><b id="poM">00</b><small>min</small></div>
          <div class="po-unit"><b id="poS">00</b><small>sec</small></div>
        </div>
      </div>
    </div>
  </div>
  <script>
  (function(){
    var start=new Date('2026-07-17T00:00:00').getTime();   // Friday — pre-orders open
    var end=new Date('2026-07-20T00:00:00').getTime();      // end of Sunday night
    var label=document.getElementById('poLabel');
    var D=document.getElementById('poD'),H=document.getElementById('poH'),M=document.getElementById('poM'),S=document.getElementById('poS');
    function p(n){return String(n).padStart(2,'0');}
    function set(t){ D.textContent=p(Math.floor(t/864e5)); H.textContent=p(Math.floor(t%864e5/36e5)); M.textContent=p(Math.floor(t%36e5/6e4)); S.textContent=p(Math.floor(t%6e4/1e3)); }
    function tick(){
      var now=Date.now();
      if(now<start){ label.textContent='Pre-orders start Friday — opens in'; set(start-now); }
      else if(now<end){ label.textContent='Pre-order sale is live — ends Sunday night in'; set(end-now); }
      else { document.querySelector('.po-countwrap').innerHTML='<div class="po-live">The pre-order event has ended — thank you!</div>'; return; }
    }
    tick(); setInterval(tick,1000);
  })();
  </script>
